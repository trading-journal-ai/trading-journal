<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trading Journal — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #07090d; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#07090d"/>
      <text x="14" y="30" font-family="Hanken Grotesk, sans-serif" font-size="11" font-weight="700" fill="#eef2f7">Morning</text>
      <text x="14" y="44" font-family="Hanken Grotesk, sans-serif" font-size="11" font-weight="700" fill="#6e7886">recap</text>
      <rect x="14" y="54" width="40" height="3" rx="1.5" fill="#3a424e"/>
      <rect x="14" y="62" width="56" height="3" rx="1.5" fill="#3a424e"/>
      <path d="M14 82 L30 74 L46 78 L62 66 L78 70 L86 60" fill="none" stroke="oklch(0.82 0.14 158)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="journal-data.jsx"></script>
  <script type="text/babel" src="sys.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "view": "morning",
      "showMarket": true,
      "density": "comfortable",
      "accent": "#4d9bff"
    }/*EDITMODE-END*/;

    function Root() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      // `view` is driven by a plain local state so the in-page toggle and the
      // Tweaks radio are a single, instant source of truth (no host round-trip
      // race). The tweak is still written for persistence.
      const [view, setViewState] = React.useState(TWEAK_DEFAULTS.view);
      const setView = (v) => { setViewState(v); setTweak('view', v); };

      return (
        <React.Fragment>
          <DashboardApp view={view} showMarket={t.showMarket} density={t.density} accent={t.accent} onSetView={setView} />
          <TweaksPanel>
            <TweakSection label="Recap" />
            <TweakRadio label="View" value={view} options={['morning', 'afternoon']}
                        onChange={setView} />
            <TweakToggle label="Market context" value={t.showMarket}
                         onChange={(v) => setTweak('showMarket', v)} />
            <TweakSection label="Display" />
            <TweakRadio label="Density" value={t.density} options={['comfortable', 'compact']}
                        onChange={(v) => setTweak('density', v)} />
            <TweakColor label="Accent" value={t.accent}
                        options={['#4d9bff', '#56c6a9', '#d8a24a']}
                        onChange={(v) => setTweak('accent', v)} />
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
